<!-- templates/add_product.html -->

<!DOCTYPE html>
<html>
<head>
    <title>Add Fertilizer Product</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-wrapper">
    <div class="chat-header">
        ➕ Add Fertilizer Product
    </div>

    <div class="chat-body">

        <form method="POST" enctype="multipart/form-data">

            <input type="text" name="product_name" placeholder="Product Name" required><br><br>

            <input type="text" name="company" placeholder="Company Name" required><br><br>

            <input type="text" name="crop_type" placeholder="Crop Type (e.g., Tomato)" required><br><br>

            <input type="text" name="fertilizer_type" placeholder="Fertilizer Type (e.g., NPK)" required><br><br>

            <input type="number" step="0.01" name="price" placeholder="Price" required><br><br>

            <input type="number" name="stock" placeholder="Stock Quantity" required><br><br>

            <textarea name="description" placeholder="Description"></textarea><br><br>

            <input type="file" name="image" accept="image/*" required><br><br>
            
            <button type="submit">Add Product</button>

        </form>

        <br>
        <a href="{{ url_for('store_products') }}">⬅ Back to Products</a>

    </div>
</div>

</body>
</html>
